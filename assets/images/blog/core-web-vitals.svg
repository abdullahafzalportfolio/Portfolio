    <radialGradient id="cwv-g" cx="0.2" cy="0.2" r="0.8"><stop offset="0" stop-color="#12B886" stop-opacity="0.35"/><stop offset="1" stop-color="#12B886" stop-opacity="0"/></radialGradient>
    <pattern id="cwv-d" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="1.5" cy="1.5" r="1.5" fill="#fff" opacity="0.05"/></pattern>
