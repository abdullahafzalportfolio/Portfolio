<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Article cover: revenue-focused marketing plan dashboard">
  <defs>
    <linearGradient id="mk-a" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#12B886"/><stop offset="1" stop-color="#2FD6A0"/></linearGradient>
    <radialGradient id="mk-g" cx="0.3" cy="0.2" r="0.8"><stop offset="0" stop-color="#12B886" stop-opacity="0.35"/><stop offset="1" stop-color="#12B886" stop-opacity="0"/></radialGradient>
  </defs>
  <rect width="640" height="360" fill="#141418"/>
  <rect width="640" height="360" fill="url(#mk-g)"/>
  <text x="40" y="56" fill="#5CEBC0" font-family="system-ui, sans-serif" font-size="14" letter-spacing="3">DIGITAL MARKETING</text>
  <!-- dashboard card -->
  <g transform="translate(40 84)">
    <rect width="560" height="236" rx="16" fill="#1E1E24" stroke="#2A2A33"/>
    <text x="28" y="44" fill="#9A9AA7" font-family="system-ui, sans-serif" font-size="13" letter-spacing="1">REVENUE BY CHANNEL</text>
    <!-- bars -->
    <g>
      <rect x="40" y="150" width="46" height="52" rx="6" fill="#3A3A45"/>
      <rect x="110" y="118" width="46" height="84" rx="6" fill="#0E9F76"/>
      <rect x="180" y="92" width="46" height="110" rx="6" fill="#12B886"/>
      <rect x="250" y="70" width="46" height="132" rx="6" fill="#2FD6A0"/>
      <rect x="320" y="104" width="46" height="98" rx="6" fill="#2FD6A0"/>
    </g>
    <!-- line -->
    <polyline points="63,150 133,118 203,92 273,70 343,104 430,60 500,40" fill="none" stroke="url(#mk-a)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="500" cy="40" r="6" fill="#2FD6A0"/>
    <text x="420" y="180" fill="#F7F7F8" font-family="system-ui, sans-serif" font-size="30" font-weight="800">+34%</text>
    <text x="420" y="200" fill="#9A9AA7" font-family="system-ui, sans-serif" font-size="12">quarter over quarter</text>
  </g>
</svg>
