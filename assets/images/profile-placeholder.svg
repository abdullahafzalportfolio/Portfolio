<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 760" role="img" aria-label="Premium abstract profile visual for Abdullah Afzal">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16161C"/>
      <stop offset="1" stop-color="#0B0B0E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2FD6A0"/>
      <stop offset="0.7" stop-color="#12B886"/>
      <stop offset="1.2" stop-color="#2FD6A0"/>
    </linearGradient>
    <radialGradient id="aura" cx="0.7" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#12B886" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#12B886" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="640" height="760" fill="url(#bg)"/>
  <rect width="640" height="760" fill="url(#dots)"/>
  <rect width="640" height="760" fill="url(#aura)"/>

  <!-- Figure panel -->
  <g transform="translate(320 430)">
    <!-- soft podium glow -->
    <ellipse cx="0" cy="250" rx="230" ry="46" fill="#12B886" opacity="0.12"/>
    <!-- shoulders -->
    <path d="M-170 250 C-170 120 -95 70 0 70 C95 70 170 120 170 250 Z" fill="url(#accent)"/>
    <path d="M-170 250 C-170 120 -95 70 0 70 C95 70 170 120 170 250 Z" fill="#0B0B0E" opacity="0.12"/>
    <!-- head -->
    <circle cx="0" cy="-60" r="96" fill="url(#accent)"/>
    <circle cx="0" cy="-60" r="96" fill="#0B0B0E" opacity="0.08"/>
    <!-- inner cut for depth -->
    <path d="M-150 250 C-150 140 -80 96 0 96 C80 96 150 140 150 250 Z" fill="#141418" opacity="0.35"/>
  </g>

  <!-- Floating proof card: rising chart -->
  <g transform="translate(60 120)">
    <rect width="196" height="120" rx="16" fill="#1E1E24" stroke="#2A2A33"/>
    <text x="18" y="34" fill="#9A9AA7" font-family="system-ui, sans-serif" font-size="13" letter-spacing="1">ORGANIC TRAFFIC</text>
    <polyline points="18,92 55,80 92,84 129,58 166,34" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="166" cy="34" r="5" fill="#2FD6A0"/>
  </g>

  <!-- Floating proof card: performance gauge -->
  <g transform="translate(430 560)">
    <rect width="150" height="150" rx="18" fill="#1E1E24" stroke="#2A2A33"/>
    <circle cx="75" cy="70" r="40" fill="none" stroke="#2A2A33" stroke-width="9"/>
    <circle cx="75" cy="70" r="40" fill="none" stroke="#2FD6A0" stroke-width="9" stroke-linecap="round"
            stroke-dasharray="251" stroke-dashoffset="12" transform="rotate(-90 75 70)"/>
    <text x="75" y="78" text-anchor="middle" fill="#F7F7F8" font-family="system-ui, sans-serif" font-size="30" font-weight="700">98</text>
    <text x="75" y="126" text-anchor="middle" fill="#9A9AA7" font-family="system-ui, sans-serif" font-size="12" letter-spacing="1">PERFORMANCE</text>
  </g>
</svg>
