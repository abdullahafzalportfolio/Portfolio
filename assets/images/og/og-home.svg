    <path d="M26 64 L44 24 L62 64" fill="none" stroke="#0B0B0E" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M34 52 H54" stroke="#0B0B0E" stroke-width="7" stroke-linecap="round"/>
  </g>
  <text x="196" y="146" fill="#F7F7F8" font-family="Georgia, serif" font-size="34" font-weight="700">Abdullah Afzal</text>
  <text x="90" y="330" fill="#F7F7F8" font-family="Georgia, serif" font-size="76" font-weight="700">Traffic into</text>
  <text x="90" y="418" fill="url(#og-a)" font-family="Georgia, serif" font-size="76" font-weight="700">revenue.</text>
  <text x="90" y="486" fill="#9A9AA7" font-family="system-ui, sans-serif" font-size="26">Shopify · Local &amp; Technical SEO · CRO · AI Automation</text>
