    <rect x="222" y="524" width="140" height="44" rx="22" fill="none" stroke="#2A2A33"/><text x="292" y="552" text-anchor="middle">Canada</text>
    <rect x="374" y="524" width="100" height="44" rx="22" fill="none" stroke="#2A2A33"/><text x="424" y="552" text-anchor="middle">UK</text>
    <rect x="486" y="524" width="160" height="44" rx="22" fill="none" stroke="#2A2A33"/><text x="566" y="552" text-anchor="middle">Australia</text>
