    <linearGradient id="og-a" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#12B886"/><stop offset="0.6" stop-color="#2FD6A0"/><stop offset="1.3" stop-color="#2FD6A0"/></linearGradient>
    <radialGradient id="og-glow" cx="0.82" cy="0.15" r="0.6"><stop offset="0" stop-color="#12B886" stop-opacity="0.45"/><stop offset="1" stop-color="#12B886" stop-opacity="0"/></radialGradient>
    <pattern id="og-d" width="30" height="30" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="2" fill="#fff" opacity="0.05"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg)"/>
